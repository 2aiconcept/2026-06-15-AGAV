<dialog
  #dialog
  class="confirm-dialog"
  aria-labelledby="confirm-dialog-title"
  aria-describedby="confirm-dialog-message"
  (cancel)="cancelled.emit()"
>
  <h2 id="confirm-dialog-title" class="h5">{{ title() }}</h2>
  <p id="confirm-dialog-message" class="mb-4">{{ message() }}</p>

  <div class="d-flex justify-content-end gap-2">
    <button type="button" class="btn btn-secondary" (click)="cancelled.emit()">
      {{ cancelLabel() }}
    </button>
    <button type="button" class="btn btn-danger" (click)="confirmed.emit()">
      {{ confirmLabel() }}
    </button>
  </div>
</dialog>
