<!-- BOUTON ADD COMPANY -->
 <div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3 m-0">Entreprises</h1>
  <button type="button" class="btn btn-primary" (click)="onAddCompany()">
    Ajouter une entreprise
  </button>
</div>

<!-- IF ERRORS DISPLAY ERRORS -->
@if (error()) {
  <div class="alert alert-danger" role="alert">{{ error() }}</div>
}

<!-- TABLE DE DISPLAY COMPANIES -->
    <!-- A COMPONENT WITH ACTIONS DELETE AND UPDATE COMPANIES -->*
<app-table-company 
    [companies]="companies()"
    (editCompany)="editItem($event)"
    (deleteCompany)="onDeleteRequest($event)"
/>

<!-- BOITE DE DIALOGUE TO CONFIRM DELETE COMPANY -->
<app-confirm-dialog
  [open]="pendingDeleteId() !== null"
  title="Supprimer l'entreprise"
  [message]="confirmMessage()"
  confirmLabel="Supprimer"
  cancelLabel="Annuler"
  (confirmed)="confirmDelete()"
  (cancelled)="cancelDelete()"
/>
