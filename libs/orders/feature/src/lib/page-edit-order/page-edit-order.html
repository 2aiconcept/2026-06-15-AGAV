<h1 class="h3 mb-3">Modifier une commande</h1>

@if (error()) {
  <div class="alert alert-danger" role="alert">{{ error() }}</div>
}

@if (initialValue(); as value) {
  <app-form-order [initialValue]="value" submitLabel="Enregistrer" (save)="onSave($event)" />
} @else if (!error()) {
  <p aria-live="polite">Chargement…</p>
}
