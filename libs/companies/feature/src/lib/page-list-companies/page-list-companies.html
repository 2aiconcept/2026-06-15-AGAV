<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3 m-0">Entreprises</h1>
  <button type="button" class="btn btn-primary" (click)="onAddCompany()">
    Ajouter une entreprise
  </button>
</div>

@if (error()) {
  <div class="alert alert-danger" role="alert">{{ error() }}</div>
}

<app-table-company
  [companies]="companies()"
  (editCompany)="editItem($event)"
  (deleteCompany)="pendingDeleteId.set($event)"
/>

<app-confirm-dialog
  [open]="pendingDeleteId() !== null"
  title="Supprimer l'entreprise"
  message="Voulez-vous vraiment supprimer cette entreprise ? Cette action est irréversible."
  confirmLabel="Supprimer"
  cancelLabel="Annuler"
  (confirmed)="confirmDelete()"
  (cancelled)="pendingDeleteId.set(null)"
/>
