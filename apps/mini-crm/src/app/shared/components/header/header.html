<div
  class="bg-primary d-flex align-items-center justify-content-between text-white px-3 py-3 h-100"
>
  <h1 class="h4 m-0">Mini CRM</h1>

  @if (auth.isAuthenticated()) {
    <div class="d-flex align-items-center gap-3">
      <span>Connecté : {{ auth.currentUser() }}</span>
      <button type="button" class="btn btn-outline-light" (click)="logout()">Déconnexion</button>
    </div>
  }
</div>
